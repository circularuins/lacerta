services:
  postgres:
    image: postgres:16-alpine
    container_name: lacerta-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: lacerta
      POSTGRES_PASSWORD: lacerta
      POSTGRES_DB: lacerta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lacerta"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
